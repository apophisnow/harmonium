name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Typecheck server
        run: npm run typecheck --workspace=server

      - name: Typecheck client
        run: npm run typecheck --workspace=client

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: typecheck

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: harmonium
          POSTGRES_PASSWORD: harmonium
          POSTGRES_DB: harmonium
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U harmonium"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://harmonium:harmonium@localhost:5432/harmonium
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-min-16-chars
      JWT_REFRESH_SECRET: ci-test-refresh-secret-16
      PORT: 3001
      CLIENT_URL: http://localhost:5173
      MEDIASOUP_ANNOUNCED_IP: 127.0.0.1
      MEDIASOUP_PREFER_TCP: "true"
      UPLOAD_DIR: ./uploads
      MAX_UPLOAD_SIZE: 10485760
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install system dependencies (mediasoup)
        run: sudo apt-get update && sudo apt-get install -y python3 python3-pip build-essential

      - run: npm ci

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Build server
        run: |
          npm run build --workspace=server
          cp -r server/src/db/migrations server/dist/db/migrations

      - name: Run unit tests
        run: npm test --workspace=server --workspace=client --if-present

      - name: Start server for integration tests
        run: |
          cd server && node dist/index.js &
          # Wait for server to be ready (fail if it doesn't start in 30s)
          for i in $(seq 1 30); do
            if curl -s http://localhost:3001/health > /dev/null 2>&1; then
              echo "Server is ready"
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 1
          done
          echo "Server failed to start"
          exit 1

      - name: Run integration tests
        run: npx vitest run --config vitest.integration.config.ts
        working-directory: server
