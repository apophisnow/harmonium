# Production deployment — pulls pre-built images from GHCR.
#
# Quick start:
#   1. Copy .env.example to .env and set real secrets
#   2. docker compose -f docker-compose.prod.yml up -d
#
# Required .env variables:
#   JWT_SECRET            — random string, min 16 chars
#   JWT_REFRESH_SECRET    — random string, min 16 chars
#   MEDIASOUP_ANNOUNCED_IP — your server's public IP (for voice/video)

name: harmonium

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: harmonium
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-harmonium}
      POSTGRES_DB: harmonium
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harmonium"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  server:
    image: ghcr.io/apophisnow/harmonium-server:latest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://harmonium:${POSTGRES_PASSWORD:-harmonium}@postgres:5432/harmonium
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET in .env}
      PORT: 3001
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      MEDIASOUP_ANNOUNCED_IP: ${MEDIASOUP_ANNOUNCED_IP:-127.0.0.1}
      MEDIASOUP_PREFER_TCP: ${MEDIASOUP_PREFER_TCP:-true}
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE:-10485760}
      DEFAULT_THEME: ${DEFAULT_THEME:-harmonium}
      DEFAULT_MODE: ${DEFAULT_MODE:-dark}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@harmonium.app}
    ports:
      - "40000-40100:40000-40100/udp"
      - "40000-40100:40000-40100/tcp"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  client:
    image: ghcr.io/apophisnow/harmonium-client:latest
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    depends_on:
      server:
        condition: service_healthy
      client:
        condition: service_healthy
    ports:
      - "${PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
